<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Canvas sizing
const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

// Game state
const STATE = { IDLE: 0, PLAYING: 1, DEAD: 2 };
let state = STATE.IDLE;
let score = 0;
let highScore = 0;
let frameCount = 0;

// Bird
let bird = { x: 80, y: H / 2, vy: 0, radius: 14 };
const GRAVITY = 0.22;
const FLAP_STRENGTH = -6.2;
const FIRST_FLAP_STRENGTH = -8.5;
const MAX_FALL_SPEED = 6;

// Pipes
let pipes = [];
const PIPE_WIDTH = 56;
const BASE_GAP = 200;
const MIN_GAP = 120;
const BASE_SPEED = 2.0;
const MAX_SPEED = 5;
const BASE_SPAWN_INTERVAL = 110;
const MIN_SPAWN_INTERVAL = 65;
let pipeTimer = 0;

// Ground
const GROUND_HEIGHT = 60;
let groundOffset = 0;

// Particles
let particles = [];

// Idle bob animation
let idleBob = 0;

// Colors
const COLORS = {
  sky1: '#4dc9f6',
  sky2: '#1a73a7',
  ground: '#ded895',
  groundDark: '#c9b458',
  pipe: '#5cb85c',
  pipeDark: '#449d44',
  pipeHighlight: '#7ed67e',
  bird: '#f5c842',
  birdDark: '#d4a017',
  birdEye: '#fff',
  birdPupil: '#333',
  birdBeak: '#e8602a',
  birdWing: '#e8b730'
};

function getDifficulty() {
  const t = Math.min(score / 80, 1);
  return {
    gap: BASE_GAP - (BASE_GAP - MIN_GAP) * t,
    speed: BASE_SPEED + (MAX_SPEED - BASE_SPEED) * t,
    spawnInterval: Math.round(BASE_SPAWN_INTERVAL - (BASE_SPAWN_INTERVAL - MIN_SPAWN_INTERVAL) * t)
  };
}

function resetGame() {
  bird.y = H / 2;
  bird.vy = 0;
  pipes = [];
  particles = [];
  score = 0;
  frameCount = 0;
  pipeTimer = 0;
  // First pipe is far enough away to give the player time to settle in,
  // and its gap is centered on the bird so they don't have to navigate immediately.
  const firstGap = BASE_GAP + 40;
  pipes.push({
    x: 480,
    topHeight: H / 2 - firstGap / 2,
    gap: firstGap,
    scored: false
  });
}

function flap() {
  if (state === STATE.IDLE) {
    state = STATE.PLAYING;
    resetGame();
    bird.vy = FIRST_FLAP_STRENGTH;
    return;
  } else if (state === STATE.DEAD) {
    state = STATE.IDLE;
    resetGame();
    return;
  }
  if (state === STATE.PLAYING) {
    bird.vy = FLAP_STRENGTH;
    for (let i = 0; i < 3; i++) {
      particles.push({
        x: bird.x - 5, y: bird.y + 5,
        vx: -Math.random() * 2 - 1, vy: Math.random() * 2 - 1,
        life: 15 + Math.random() * 10, maxLife: 25,
        color: COLORS.birdWing, size: 3 + Math.random() * 3
      });
    }
  }
}

function spawnPipe() {
  const diff = getDifficulty();
  const gap = diff.gap;
  const minTop = 60;
  const maxTop = H - GROUND_HEIGHT - gap - 60;
  const topHeight = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W + 10, topHeight, gap, scored: false });
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_HEIGHT);
  grad.addColorStop(0, COLORS.sky1);
  grad.addColorStop(1, COLORS.sky2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - GROUND_HEIGHT);

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  const co = (frameCount * 0.3) % (W + 200);
  drawCloud(W - co, 80, 60);
  drawCloud(W - co + 250, 140, 45);
  drawCloud(W - co + 500, 60, 55);
}

function drawCloud(x, y, size) {
  ctx.beginPath();
  ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
  ctx.arc(x + size * 0.4, y - size * 0.15, size * 0.4, 0, Math.PI * 2);
  ctx.arc(x + size * 0.8, y, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  const diff = getDifficulty();
  if (state === STATE.PLAYING) groundOffset = (groundOffset + diff.speed) % 24;
  else groundOffset = (groundOffset + 1) % 24;

  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);
  ctx.fillStyle = COLORS.groundDark;
  ctx.fillRect(0, H - GROUND_HEIGHT, W, 4);

  ctx.strokeStyle = COLORS.groundDark;
  ctx.lineWidth = 1;
  for (let x = -groundOffset; x < W; x += 24) {
    ctx.beginPath();
    ctx.moveTo(x, H - GROUND_HEIGHT + 12);
    ctx.lineTo(x + 12, H - GROUND_HEIGHT + 24);
    ctx.stroke();
  }
}

function drawPipe(pipe) {
  const topH = pipe.topHeight;
  const bottomY = topH + pipe.gap;
  const capHeight = 24;
  const capOverhang = 4;

  const pipeGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
  pipeGrad.addColorStop(0, COLORS.pipeDark);
  pipeGrad.addColorStop(0.3, COLORS.pipeHighlight);
  pipeGrad.addColorStop(1, COLORS.pipeDark);

  ctx.fillStyle = pipeGrad;
  ctx.fillRect(pipe.x, 0, PIPE_WIDTH, topH);
  ctx.fillStyle = COLORS.pipe;
  ctx.fillRect(pipe.x - capOverhang, topH - capHeight, PIPE_WIDTH + capOverhang * 2, capHeight);
  ctx.strokeStyle = COLORS.pipeDark;
  ctx.lineWidth = 2;
  ctx.strokeRect(pipe.x - capOverhang, topH - capHeight, PIPE_WIDTH + capOverhang * 2, capHeight);

  ctx.fillStyle = pipeGrad;
  ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, H - GROUND_HEIGHT - bottomY);
  ctx.fillStyle = COLORS.pipe;
  ctx.fillRect(pipe.x - capOverhang, bottomY, PIPE_WIDTH + capOverhang * 2, capHeight);
  ctx.strokeStyle = COLORS.pipeDark;
  ctx.lineWidth = 2;
  ctx.strokeRect(pipe.x - capOverhang, bottomY, PIPE_WIDTH + capOverhang * 2, capHeight);
}

function drawBird() {
  let drawY = bird.y;
  if (state === STATE.IDLE) {
    drawY = bird.y + Math.sin(idleBob * 0.05) * 8;
  }
  const angle = state === STATE.IDLE ? 0 : Math.min(Math.max(bird.vy * 3, -30), 70) * Math.PI / 180;

  ctx.save();
  ctx.translate(bird.x, drawY);
  ctx.rotate(angle);

  ctx.fillStyle = COLORS.bird;
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.radius + 2, bird.radius, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COLORS.birdDark;
  ctx.beginPath();
  ctx.ellipse(0, 4, bird.radius - 2, bird.radius - 6, 0, 0, Math.PI);
  ctx.fill();

  const wingFlap = Math.sin(frameCount * 0.3) * 5;
  ctx.fillStyle = COLORS.birdWing;
  ctx.beginPath();
  ctx.ellipse(-4, wingFlap, 8, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COLORS.birdEye;
  ctx.beginPath();
  ctx.arc(8, -5, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COLORS.birdPupil;
  ctx.beginPath();
  ctx.arc(10, -5, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COLORS.birdBeak;
  ctx.beginPath();
  ctx.moveTo(14, -1);
  ctx.lineTo(22, 2);
  ctx.lineTo(14, 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    if (p.life <= 0) particles.splice(i, 1);
  }
  ctx.globalAlpha = 1;
}

function drawScore() {
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 4;
  ctx.font = 'bold 40px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeText(score, W / 2, 55);
  ctx.fillText(score, W / 2, 55);

  const diff = getDifficulty();
  const diffPercent = Math.round(((diff.speed - BASE_SPEED) / (MAX_SPEED - BASE_SPEED)) * 100);
  ctx.font = '14px Arial, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('Speed: ' + diffPercent + '%', W / 2, 75);
}

function drawStartScreen() {
  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f5c842';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 6;
  ctx.font = 'bold 52px Arial, sans-serif';
  ctx.strokeText('Flappy Bird', W / 2, 200);
  ctx.fillText('Flappy Bird', W / 2, 200);

  // Subtitle
  const blink = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = blink;
  ctx.fillStyle = 'white';
  ctx.font = '22px Arial, sans-serif';
  ctx.fillText('Tap SPACE repeatedly to fly', W / 2, 260);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '18px Arial, sans-serif';
    ctx.fillText('Best: ' + highScore, W / 2, 300);
  }
}

function drawDeathScreen() {
  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Game Over
  ctx.fillStyle = '#e74c3c';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 6;
  ctx.font = 'bold 48px Arial, sans-serif';
  ctx.strokeText('Game Over', W / 2, 200);
  ctx.fillText('Game Over', W / 2, 200);

  // Score
  ctx.fillStyle = 'white';
  ctx.font = 'bold 36px Arial, sans-serif';
  ctx.fillText('Score: ' + score, W / 2, 265);

  // Best
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '20px Arial, sans-serif';
  ctx.fillText('Best: ' + highScore, W / 2, 305);

  // Restart
  const blink = Math.sin(frameCount * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = blink;
  ctx.fillStyle = 'white';
  ctx.font = '20px Arial, sans-serif';
  ctx.fillText('Click or press SPACE to restart', W / 2, 370);
  ctx.globalAlpha = 1;
}

function checkCollision() {
  if (bird.y + bird.radius > H - GROUND_HEIGHT) return true;
  // Clamp to ceiling instead of killing
  if (bird.y - bird.radius < 0) {
    bird.y = bird.radius;
    bird.vy = 0;
  }

  for (const pipe of pipes) {
    const birdLeft = bird.x - bird.radius;
    const birdRight = bird.x + bird.radius;
    const birdTop = bird.y - bird.radius;
    const birdBottom = bird.y + bird.radius;
    const pipeLeft = pipe.x - 4;
    const pipeRight = pipe.x + PIPE_WIDTH + 4;

    if (birdRight > pipeLeft && birdLeft < pipeRight) {
      if (birdTop < pipe.topHeight || birdBottom > pipe.topHeight + pipe.gap) {
        return true;
      }
    }
  }
  return false;
}

function die() {
  state = STATE.DEAD;
  if (score > highScore) highScore = score;
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: bird.x, y: bird.y,
      vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
      life: 20 + Math.random() * 20, maxLife: 40,
      color: COLORS.bird, size: 3 + Math.random() * 4
    });
  }
}

function update() {
  frameCount++;
  idleBob++;

  if (state !== STATE.PLAYING) return;

  bird.vy += GRAVITY;
  bird.vy = Math.min(bird.vy, MAX_FALL_SPEED);
  bird.y += bird.vy;

  const diff = getDifficulty();

  pipeTimer++;
  if (pipeTimer >= diff.spawnInterval) {
    spawnPipe();
    pipeTimer = 0;
  }

  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= diff.speed;
    if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < bird.x) {
      pipes[i].scored = true;
      score++;
    }
    if (pipes[i].x + PIPE_WIDTH + 10 < 0) {
      pipes.splice(i, 1);
    }
  }

  if (checkCollision()) {
    die();
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();

  for (const pipe of pipes) {
    drawPipe(pipe);
  }

  drawGround();
  drawBird();
  drawParticles();

  if (state === STATE.PLAYING) {
    drawScore();
  } else if (state === STATE.IDLE) {
    drawStartScreen();
  } else if (state === STATE.DEAD) {
    drawScore();
    drawDeathScreen();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Input
document.addEventListener('keydown', function(e) {
  if (e.repeat) return; // prevent held key from rapid-firing flaps
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    flap();
  }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', function(e) { e.preventDefault(); flap(); });

// Start
gameLoop();
</script>
</body>
</html>
